---
dependency:
  name: galaxy
driver:
  name: podman
platforms:
  - name: instance
    image: "geerlingguy/docker-${MOLECULE_DISTRO:-rockylinux10}-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
provisioner:
  name: ansible
  env:
    # This navigates up out of molecule/default/ and right into your roles directory
    ANSIBLE_ROLES_PATH: ../../roles/
verifier:
  name: ansible
