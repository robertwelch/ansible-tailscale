---
dependency:
  name: galaxy

driver:
  name: podman

platforms:
  - name: rocky8
    image: "geerlingguy/docker-rockylinux8-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
  - name: rocky9
    image: "geerlingguy/docker-rockylinux9-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true
  - name: rocky10
    image: "geerlingguy/docker-rockylinux10-ansible:latest"
    command: ""
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    privileged: true
    pre_build_image: true

provisioner:
  name: ansible
  env:
    # This navigates up out of molecule/default/ and right into your roles directory
    ANSIBLE_ROLES_PATH: ../../roles/

verifier:
  name: ansible

scenario:
  test_sequence:
    # - dependency
    # - cleanup
    - destroy
    - syntax
    - create
    # - prepare
    - converge
    - idempotence
    # - side_effect
    # - verify
    # - cleanup
    - destroy
