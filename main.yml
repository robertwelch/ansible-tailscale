- name: Linux Vagrant VMs
  hosts: linux:&online:&tag_vagrantvms
  become: true
  gather_facts: true
  roles:
    - {role: linux_ping, tags: [always, ping]}
    - {role: linux_init, tags: [init]}
    - {role: linux_storage, tags: [storage]}
    - {role: linux_homeassistant, tags: [homeassistant], when: "'tag_homeassistant' in group_names"}
